name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: huggingface-space-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get current Git commit message
        shell: bash
        run: |
          {
            echo "HF_COMMIT_MESSAGE<<EOF"
            git log -1 --pretty=%B
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Install Hugging Face tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade huggingface_hub hf_xet

      - name: Mirror GitHub files to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_COMMIT_MESSAGE: ${{ env.HF_COMMIT_MESSAGE }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          repo_id = "Jacob7179/TNL6323-Project"
          token = os.environ["HF_TOKEN"]

          commit_message = os.environ.get(
              "HF_COMMIT_MESSAGE",
              "Sync from GitHub Actions"
          ).strip()

          api = HfApi(token=token)

          api.upload_folder(
              folder_path=".",
              repo_id=repo_id,
              repo_type="space",
              commit_message=commit_message,
              ignore_patterns=[
                  ".git/*",
                  ".github/*",
                  "__pycache__/*",
                  "*.pyc",
                  "*.pyo",
                  ".venv/*",
                  "venv/*",
                  ".env",
                  ".DS_Store",
              ],
              delete_patterns=[
                  "*",
                  "**/*",
              ],
          )
          PY